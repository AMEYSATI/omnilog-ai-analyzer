<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniLog AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      tailwind.config = {
      darkMode: 'class'
      }
    </script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <style>
      .prose ol {
      list-style-type: decimal;
      padding-left: 1.5rem;
      }
      .prose ol li::marker {
      color: #60a5fa;
      font-weight: bold;
      }
      .prose li {
      margin-bottom: 0.75rem;
      }
    </style>
  </head>
  <body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- COMPONENT: Log Card ---
    const LogCard = ({ log }) => {
      // Logic for severity/priority moved here
      const getSeverity = (msg) => {
        const text = (msg || "").toLowerCase();
        if (text.includes("fatal") || text.includes("panic")) return { label: "CRITICAL", color: "bg-red-600" };
        if (text.includes("error")) return { label: "ERROR", color: "bg-orange-500" };
        return { label: "INFO", color: "bg-gray-600" };
      };

      const sev = getSeverity(log.message);

      return (
        <div className="bg-gray-100 dark:bg-gray-800 border-l-4 border-blue-500 p-6 rounded-r-xl shadow-lg">
          <div className="flex justify-between items-start mb-4">
            <div className="flex gap-2">
              <span className="bg-gray-300 dark:bg-gray-700 text-blue-700 dark:text-blue-300 px-3 py-1 rounded text-xs">{log.projectId}</span>
              <span className={`${sev.color} text-white px-2 py-1 rounded text-xs`}>{sev.label}</span>
            </div>
            <span className="text-gray-500 text-sm">{new Date(log.createdAt).toLocaleString()}</span>
          </div>
          <h3 className="text-xl font-bold text-red-500 mb-2">{log.message}</h3>
          <div className="bg-gray-200 dark:bg-black/30 p-4 rounded-lg mb-4 font-mono text-sm">
            {log.stackTrace || "No stack trace"}
          </div>
          <details className="bg-blue-100 dark:bg-blue-900/10 border border-blue-300 dark:border-blue-800/30 rounded-lg group">
            <summary className="cursor-pointer p-4 font-bold text-blue-700 dark:text-blue-400">AI ANALYSIS ▼</summary>
            <div 
                className="p-4 prose dark:prose-invert max-w-none"
                dangerouslySetInnerHTML={{ __html: marked.parse(log.analysis || "") }} 
            />
          </details>
        </div>
      );
    };

    // --- MAIN APP ---
    const App = () => {
      const [logs, setLogs] = useState([]);
      const [search, setSearch] = useState("");
      const [page, setPage] = useState(1);
      const pageSize = 10;

      // 1. Initial Fetch & Socket Setup
      useEffect(() => {
        fetch("http://localhost:3001/logs")
          .then(res => res.json())
          .then(data => setLogs(data));

        const socket = io("http://localhost:3001");
        socket.on("new_log_ready", (newLog) => {
          setLogs(prev => [newLog, ...prev]);
        });

        return () => socket.disconnect();
      }, []);

      // 2. Filter & Pagination Logic
      const filteredLogs = logs.filter(l => 
        (l.message||"").toLowerCase().includes(search.toLowerCase()) ||
        (l.projectId||"").toLowerCase().includes(search.toLowerCase())
      );

      const paginatedLogs = filteredLogs.slice((page - 1) * pageSize, page * pageSize);

      return (
        <div className="max-w-6xl mx-auto p-8">
          <header className="flex justify-between items-center mb-8">
            <h1 className="text-4xl font-bold text-blue-500">OmniLog AI</h1>
            <div className="flex gap-3">
              <input 
                className="bg-gray-200 dark:bg-gray-800 p-2 rounded-lg"
                placeholder="Search..." 
                onChange={(e) => {setSearch(e.target.value); setPage(1);}}
              />
              <button onClick={() => window.location.reload()} className="bg-blue-600 p-2 rounded text-white font-bold">Refresh</button>
            </div>
          </header>

          <div className="grid gap-6">
            {paginatedLogs.map(log => <LogCard key={log.id} log={log} />)}
          </div>

          <div className="flex justify-center mt-8 gap-4 items-center">
            <button disabled={page === 1} onClick={() => setPage(p => p - 1)} className="bg-gray-700 px-4 py-2 rounded disabled:opacity-50">Prev</button>
            <span>Page {page} of {Math.ceil(filteredLogs.length / pageSize)}</span>
            <button disabled={page >= filteredLogs.length / pageSize} onClick={() => setPage(p => p + 1)} className="bg-gray-700 px-4 py-2 rounded disabled:opacity-50">Next</button>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
